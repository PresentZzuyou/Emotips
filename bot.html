<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이모팁스 기초컨설팅 봇</title>
<meta property="og:title" content="이모팁스 기초컨설팅 봇">
<meta property="og:description" content="100건 1:1 맞춤 컨설팅 데이터 기반 카카오톡 이모티콘 전문 컨설팅봇">
<meta property="og:type" content="website">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── 모바일 기본 (전체화면) ── */
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #fff;
    margin: 0;
    padding: 0;
  }

  .chat-wrapper {
    width: 100%;
    background: #fff;
    border-radius: 0;
    box-shadow: none;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  .chat-header {
    background: linear-gradient(135deg, #0b8bff, #0070d6);
    padding: 16px 18px;
    color: white;
    border-radius: 0;
    flex-shrink: 0;
  }
  .chat-header .bot-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .chat-header .bot-sub {
    font-size: 11px;
    opacity: 0.85;
    margin-top: 3px;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-insta-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.5);
    color: #fff;
    border-radius: 20px;
    padding: 5px 11px;
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .header-insta-btn:hover { background: rgba(255,255,255,0.3); }
  .bot-avatar {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeInUp 0.3s ease;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .msg-bubble {
    background: #f5f5f8;
    border-radius: 18px 18px 18px 4px;
    padding: 11px 14px;
    max-width: 84%;
    font-size: 14px;
    line-height: 1.65;
    color: #222;
    word-break: keep-all;
  }

  .msg-bubble.highlight {
    background: #e6f4ff;
    border-left: 3px solid #0b8bff;
  }

  .msg-bubble em {
    font-style: normal;
    color: #0b8bff;
    font-weight: 600;
  }

  .msg-bubble .tip-box {
    background: #fffde0;
    border-radius: 10px;
    padding: 10px 12px 10px 38px;
    margin-top: 10px;
    font-size: 13px;
    color: #555;
    border-left: 3px solid #ffff33;
    position: relative;
  }
  .msg-bubble .tip-box::before {
    content: "!";
    position: absolute;
    left: 10px;
    top: 10px;
    width: 18px;
    height: 18px;
    background: #0b8bff;
    color: #fff;
    border-radius: 50%;
    font-weight: 800;
    font-size: 12px;
    line-height: 18px;
    text-align: center;
  }
  .msg-bubble .tip-box.warn {
    background: #fffde0;
    border-left: 3px solid #ffff33;
  }
  .msg-bubble .tip-box.warn::before {
    content: "!";
    background: #0b8bff;
  }

  .msg-bubble .check-list {
    margin-top: 8px;
    margin-bottom: 14px;
    padding-left: 0;
    list-style: none;
  }
  .msg-bubble .check-list li {
    padding: 3px 0;
    font-size: 13px;
    color: #444;
  }
  .msg-bubble .check-list li::before {
    content: "✅ ";
  }
  .msg-bubble .check-list.warn li::before {
  }
  .msg-bubble .check-list.dot li::before {
    content: "• ";
    color: #0b8bff;
  }

  .buttons-row {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 4px 12px 14px 50px;
    animation: fadeInUp 0.3s ease;
  }

  .btn-choice {
    background: #fff;
    border: 1.5px solid #0b8bff;
    color: #0b8bff;
    border-radius: 20px;
    padding: 9px 15px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    line-height: 1.3;
    word-break: keep-all;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-choice:hover {
    background: #0b8bff;
    color: white;
    box-shadow: 0 3px 12px rgba(11,139,255,0.3);
  }
  .btn-choice:active {
    background: #0070d6;
    color: white;
    transform: scale(0.97);
  }
  .btn-choice.selected {
    background: #0b8bff;
    color: white;
    pointer-events: none;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    animation: fadeInUp 0.3s ease;
  }
  .typing-dots {
    background: #f5f5f8;
    border-radius: 18px;
    padding: 12px 16px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .typing-dots span {
    width: 7px;
    height: 7px;
    background: #ccc;
    border-radius: 50%;
    animation: bounce 1s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .restart-btn {
    margin: 6px 12px 12px;
    padding: 11px;
    background: #f5f5f8;
    border: none;
    border-radius: 12px;
    font-size: 13px;
    color: #888;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .restart-btn:hover { background: #eee; color: #555; }

  /* ── 후킹 공통 ── */
  .hook-link-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 9px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }
  .hook-link-btn.insta {
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    color: #fff;
    margin-right: 8px;
  }
  .hook-link-btn.littly {
    background: #0b8bff;
    color: #fff;
  }
  .hook-link-btn:hover { opacity: 0.85; transform: translateY(-1px); }

  /* ── 스타일 A: 채팅 말풍선 (봇 메시지) ── */
  .hook-bubble {
    background: linear-gradient(135deg, #0b8bff, #0070d6);
    color: #fff;
    border-radius: 18px 18px 18px 4px;
    padding: 14px 16px;
    max-width: 88%;
    font-size: 14px;
    line-height: 1.7;
  }
  .hook-bubble .hook-link-btn.insta,
  .hook-bubble .hook-link-btn.littly {
    background: rgba(255,255,255,0.2);
    border: 1.5px solid rgba(255,255,255,0.6);
    color: #fff;
  }
  .hook-bubble .hook-link-btn:hover { background: rgba(255,255,255,0.35); transform: none; }

  /* ── 스타일 B: 팝업 오버레이 ── */
  .hook-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    animation: fadeInUp 0.3s ease;
  }
  .hook-overlay-card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px 22px;
    max-width: 340px;
    width: 90%;
    text-align: center;
    position: relative;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  }
  .hook-overlay-card .hook-emoji { font-size: 36px; margin-bottom: 10px; }
  .hook-overlay-card h3 { font-size: 16px; font-weight: 800; color: #111; margin-bottom: 8px; }
  .hook-overlay-card p { font-size: 13px; color: #555; line-height: 1.65; margin-bottom: 14px; }
  .hook-close {
    position: absolute;
    top: 12px; right: 16px;
    background: none; border: none;
    font-size: 18px; color: #aaa;
    cursor: pointer; line-height: 1;
  }

  /* ── 스타일 C: 하단 배너 슬라이드업 ── */
  .hook-banner {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 3px solid #0b8bff;
    border-radius: 20px 20px 0 0;
    padding: 18px 20px 24px;
    z-index: 200;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 560px;
    margin: 0 auto;
  }
  .hook-banner.show { transform: translateY(0); }
  .hook-banner-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .hook-banner h3 { font-size: 15px; font-weight: 800; color: #111; }
  .hook-banner p { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 12px; }
  .hook-banner .hook-close { position: static; font-size: 20px; }

  /* ── 모바일 헤더 조정 ── */
  .insta-btn-text { display: none; }
  .header-insta-btn { padding: 6px 8px; }
  .chat-header .bot-sub { display: block; font-size: 10px; }
  .sub-extra { display: none; }

  /* ── 데스크톱 (600px 이상) ── */
  @media (min-width: 600px) {
    body {
      background: #f0f0f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 20px;
      box-sizing: border-box;
    }

    .chat-wrapper {
      width: clamp(520px, 65vw, 900px);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      height: 90vh;
      max-height: 800px;
    }

    .chat-header {
      padding: 20px 24px;
      border-radius: 24px 24px 0 0;
    }
    .chat-header .bot-name { font-size: 17px; }
    .chat-header .bot-sub { display: block; font-size: 12px; }
    .sub-extra { display: inline; }
    .insta-btn-text { display: inline; }
    .header-insta-btn { padding: 5px 11px; }

    .bot-avatar { width: 42px; height: 42px; }

    .chat-messages {
      padding: 20px 16px;
      gap: 12px;
    }

    .msg-avatar { width: 32px; height: 32px; }

    .msg-bubble {
      padding: 12px 16px;
      max-width: 82%;
    }

    .buttons-row {
      gap: 8px;
      padding: 4px 16px 16px 56px;
    }

    .btn-choice { padding: 8px 16px; }
    .btn-choice:hover { transform: translateY(-1px); }

    .restart-btn { margin: 8px 16px 16px; }
  }
</style>
</head>

// ── 렌더링 엔진 ────────────────────────────────────────
let currentButtons = null;

function addBotMsg(htmlContent, isHighlight = false) {
  return new Promise(resolve => {
    // 타이핑 표시
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row typing-indicator';
    typingRow.innerHTML = `
      <div class="msg-avatar">${AVATAR}</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>`;
    messages.appendChild(typingRow);
    scrollToBottom();

    const delay = Math.min(800 + htmlContent.length * 1.5, 2000);

    setTimeout(() => {
      typingRow.remove();
      const row = document.createElement('div');
      row.className = 'msg-row';
      row.innerHTML = `
        <div class="msg-avatar">${AVATAR}</div>
        <div class="msg-bubble${isHighlight ? ' highlight' : ''}">${htmlContent}</div>`;
      messages.appendChild(row);
      scrollToBottom();
      resolve();
    }, delay);
  });
}

function addButtons(buttons) {
  if (currentButtons) currentButtons.remove();

  const row = document.createElement('div');
  row.className = 'buttons-row';
  currentButtons = row;

  buttons.forEach(btn => {
    const b = document.createElement('button');
    b.className = 'btn-choice';
    b.textContent = btn.text;
    b.onclick = () => {
      // 선택된 버튼 표시
      row.querySelectorAll('.btn-choice').forEach(el => el.disabled = true);
      b.classList.add('selected');

      setTimeout(() => {
        row.remove();
        currentButtons = null;
        goTo(btn.next);
      }, 200);
    };
    row.appendChild(b);
  });

  messages.appendChild(row);
  scrollToBottom();
}

async function goTo(flowKey) {
  const flow = FLOWS[flowKey];
  if (!flow) return;

  await addBotMsg(flow.msg);
  if (flow.buttons) addButtons(flow.buttons);
  checkHookTrigger();
}

function scrollToBottom() {
  setTimeout(() => {
    messages.scrollTop = messages.scrollHeight;
  }, 50);
}

function restartChat() {
  messages.innerHTML = '';
  currentButtons = null;
  goTo('start');
}
