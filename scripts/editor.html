<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이모팁스 영상 편집기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f7f7f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    color: #231815;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }

  .header p {
    margin-top: 8px;
    font-size: 13px;
    color: #888;
  }

  /* 드롭존 */
  .drop-zone {
    width: 100%;
    max-width: 560px;
    border: 2.5px dashed #ccc;
    border-radius: 20px;
    background: #fff;
    padding: 60px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .drop-zone.over {
    border-color: #e84c3d;
    background: #fff5f4;
  }

  .drop-zone.uploading {
    pointer-events: none;
    opacity: 0.7;
  }

  .drop-icon {
    font-size: 52px;
    margin-bottom: 16px;
    display: block;
  }

  .drop-zone h2 {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .drop-zone p {
    font-size: 13px;
    color: #aaa;
  }

  .file-input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  /* 기능 뱃지 */
  .features {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 24px 0;
    max-width: 560px;
  }

  .badge {
    background: #fff;
    border: 1.5px solid #e0e0e0;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: #555;
  }

  /* 진행 패널 */
  .progress-panel {
    display: none;
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    margin-top: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .progress-panel.visible { display: block; }

  .progress-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2.5px solid #eee;
    border-top-color: #e84c3d;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .log-box {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 16px;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 12px;
    color: #c8f0a0;
    max-height: 260px;
    overflow-y: auto;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .log-box .log-error { color: #ff8080; }
  .log-box .log-done  { color: #80ffcc; font-weight: bold; }

  /* 완료 카드 */
  .done-card {
    display: none;
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    margin-top: 16px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .done-card.visible { display: block; }

  .done-card .check { font-size: 48px; margin-bottom: 12px; }

  .done-card h3 {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .done-card p {
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
  }

  .btn-again {
    display: inline-block;
    background: #231815;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-again:hover { background: #e84c3d; }

  /* 업로드 진행 바 */
  .upload-bar-wrap {
    display: none;
    width: 100%;
    max-width: 560px;
    margin-top: 16px;
  }

  .upload-bar-wrap.visible { display: block; }

  .upload-bar-bg {
    height: 6px;
    background: #eee;
    border-radius: 99px;
    overflow: hidden;
  }

  .upload-bar-fill {
    height: 100%;
    background: #e84c3d;
    border-radius: 99px;
    width: 0%;
    transition: width 0.2s;
  }

  .upload-label {
    font-size: 12px;
    color: #aaa;
    margin-top: 6px;
    text-align: right;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎬 이모팁스 영상 편집기</h1>
  <p>영상을 드래그하면 자동으로 편집해서 바탕화면에 저장해 드려요</p>
</div>

<div class="features">
  <span class="badge">🔇 무음 구간 삭제</span>
  <span class="badge">🗣️ 더듬거림 제거</span>
  <span class="badge">💬 자동 자막 생성</span>
  <span class="badge">🖥️ 바탕화면 자동 저장</span>
</div>

<div class="drop-zone" id="dropZone">
  <input type="file" class="file-input" id="fileInput" accept="video/*">
  <span class="drop-icon">🎥</span>
  <h2>영상을 여기에 드래그하세요</h2>
  <p>또는 클릭해서 파일 선택 · MOV, MP4, M4V 지원</p>
</div>

<div class="upload-bar-wrap" id="uploadBarWrap">
  <div class="upload-bar-bg">
    <div class="upload-bar-fill" id="uploadBarFill"></div>
  </div>
  <div class="upload-label" id="uploadLabel">업로드 중...</div>
</div>

<div class="progress-panel" id="progressPanel">
  <div class="progress-title">
    <div class="spinner" id="spinner"></div>
    <span id="progressTitle">편집 중...</span>
  </div>
  <div class="log-box" id="logBox"></div>
</div>

<div class="done-card" id="doneCard">
  <div class="check">✅</div>
  <h3>편집 완료!</h3>
  <p id="doneMsg">바탕화면에 저장됐어요</p>
  <button class="btn-again" onclick="reset()">다른 영상 편집하기</button>
</div>

<script>
  const dropZone     = document.getElementById('dropZone');
  const fileInput    = document.getElementById('fileInput');
  const progressPanel = document.getElementById('progressPanel');
  const logBox       = document.getElementById('logBox');
  const doneCard     = document.getElementById('doneCard');
  const doneMsg      = document.getElementById('doneMsg');
  const spinner      = document.getElementById('spinner');
  const progressTitle = document.getElementById('progressTitle');
  const uploadBarWrap = document.getElementById('uploadBarWrap');
  const uploadBarFill = document.getElementById('uploadBarFill');
  const uploadLabel  = document.getElementById('uploadLabel');

  // 드래그앤드롭
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    if (!file.type.startsWith('video/')) {
      alert('영상 파일만 업로드 가능합니다.');
      return;
    }

    dropZone.classList.add('uploading');
    uploadBarWrap.classList.add('visible');
    uploadBarFill.style.width = '0%';

    const formData = new FormData();
    formData.append('video', file);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/upload');

    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        const pct = Math.round(e.loaded / e.total * 100);
        uploadBarFill.style.width = pct + '%';
        uploadLabel.textContent = `업로드 중... ${pct}%  (${(e.loaded/1024/1024).toFixed(1)} MB / ${(e.total/1024/1024).toFixed(1)} MB)`;
      }
    };

    xhr.onload = () => {
      uploadBarWrap.classList.remove('visible');
      if (xhr.status === 200) {
        const { job_id } = JSON.parse(xhr.responseText);
        startProgress(job_id);
      } else {
        alert('업로드 실패. 서버를 확인하세요.');
        reset();
      }
    };

    xhr.send(formData);
  }

  function startProgress(jobId) {
    progressPanel.classList.add('visible');
    logBox.innerHTML = '';

    const es = new EventSource(`/progress/${jobId}`);
    es.onmessage = e => {
      const data = JSON.parse(e.data);

      if (data.type === 'end') { es.close(); return; }

      if (data.type === 'done') {
        spinner.style.display = 'none';
        progressTitle.textContent = '완료!';
        appendLog(data.msg, 'log-done');
        setTimeout(() => showDone(data.msg), 600);
      } else if (data.type === 'path') {
        // 경로 정보 — 따로 표시
      } else if (data.type === 'error') {
        appendLog(data.msg, 'log-error');
        spinner.style.display = 'none';
        progressTitle.textContent = '오류 발생';
      } else {
        appendLog(data.msg);
      }
    };
  }

  function appendLog(msg, cls) {
    const line = document.createElement('div');
    if (cls) line.className = cls;
    line.textContent = msg;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
  }

  function showDone(msg) {
    doneCard.classList.add('visible');
    const match = msg.match(/바탕화면에 저장: (.+)/);
    if (match) doneMsg.textContent = `바탕화면에 "${match[1]}" 저장 완료!`;
    else doneMsg.textContent = msg;
  }

  function reset() {
    dropZone.classList.remove('uploading', 'over');
    progressPanel.classList.remove('visible');
    doneCard.classList.remove('visible');
    uploadBarWrap.classList.remove('visible');
    logBox.innerHTML = '';
    spinner.style.display = '';
    progressTitle.textContent = '편집 중...';
    fileInput.value = '';
  }
</script>
</body>
</html>
